<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 400px; background-color: #ffffff; border: none; border-radius: 4px;">
        <h3 class="fw-bold mb-4" style="color: #212529;">Registration</h3> [cite: 7]
        
        <form th:action="@{/saveUser}" th:object="${user}" method="POST">
            <div class="mb-3">
                <label class="form-label text-secondary small fw-semibold">Username:</label> [cite: 8]
                <input type="text" th:field="*{userName}" class="form-control" required style="border-color: #dee2e6;">
            </div>
            
            <div class="mb-3">
                <label class="form-label text-secondary small fw-semibold">Password:</label> [cite: 9]
                <input type="password" th:field="*{password}" class="form-control" required style="border-color: #dee2e6;">
            </div>

            <div class="mb-3">
                <label class="form-label text-secondary small fw-semibold">Email:</label> [cite: 10]
                <input type="email" th:field="*{emailId}" class="form-control" required style="border-color: #dee2e6;">
            </div>

            <div class="mb-3">
                <label class="form-label text-secondary small fw-semibold">Full Name:</label> [cite: 11]
                <input type="text" th:field="*{fullName}" class="form-control" required style="border-color: #dee2e6;">
            </div>
            
            <button type="submit" class="btn w-100 text-white fw-semibold my-2" style="background-color: #3174b8; border: none; padding: 10px;">Register</button> [cite: 12]
            
            <div class="text-center mt-3">
                <a th:href="@{/login}" style="color: #0000ee; text-decoration: underline; font-size: 14px;">Already have an account? Login here</a> [cite: 13]
            </div>
        </form>
    </div>

</body>
</html>
