<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 400px; background-color: #ffffff; border: none; border-radius: 4px;">
        <h3 class="fw-bold mb-4" style="color: #212529;">Login Page</h3> 
        
        <div th:if="${error}" class="alert alert-danger p-2 small" th:text="${error}"></div>
        
        <form th:action="@{/loginUser}" method="POST">
            <div class="mb-3">
                <label class="form-label text-secondary small fw-semibold">Username:</label> 
                <input type="text" name="userName" class="form-control" required style="border-color: #dee2e6;">
            </div>
            
            <div class="mb-3">
                <label class="form-label text-secondary small fw-semibold">Password:</label> 
                <input type="password" name="password" class="form-control" required style="border-color: #dee2e6;">
            </div>
            
            <button type="submit" class="btn w-100 text-white fw-semibold my-2" style="background-color: #4caf50; border: none; padding: 10px;">Login</button>
            
            <div class="text-center mt-3">
                <a th:href="@{/register}" style="color: #0000ee; text-decoration: underline; font-size: 14px;">New user? Register here</a>
            </div>
        </form>
    </div>

</body>
</html>
